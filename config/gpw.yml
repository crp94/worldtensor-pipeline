# GPWv4.11 — Gridded Population of the World, Revision 11
#
# Source: SEDAC / CIESIN (Columbia University), now hosted on NASA Earthdata
# Reference: CIESIN (2018), GPWv4 rev11
# URL: https://www.earthdata.nasa.gov/data/catalog/sedac-ciesin-sedac-gpwv4-popcount-r11-4.11
#
# Data migrated from sedac.ciesin.columbia.edu to data.earthdata.nasa.gov.
# Requires NASA Earthdata Bearer token for download.

base_url: https://data.earthdata.nasa.gov/nasa-earth/human-dimensions/sedac-root/downloads/data/gpw-v4
anchor_years: [2000, 2005, 2010, 2015, 2020]
output_years: [2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009,
               2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020]
interpolation: linear

variables:
  population_count:
    slug: gpw-v4-population-count-rev11
    filename: "gpw-v4-population-count-rev11_totpop_2pt5_min_nc.zip"
    format: nc
    units: "persons"
    long_name: "Population count"

  population_density:
    slug: gpw-v4-population-density-rev11
    filename: "gpw-v4-population-density-rev11_totpop_2pt5_min_nc.zip"
    format: nc
    units: "persons/km²"
    long_name: "Population density"

  unwpp_adjusted_density:
    slug: gpw-v4-population-density-adjusted-to-2015-unwpp-country-totals-rev11
    filename: "gpw-v4-population-density-adjusted-to-2015-unwpp-country-totals-rev11_totpop_2pt5_min_nc.zip"
    format: nc
    units: "persons/km²"
    long_name: "UN WPP-adjusted population density"

  land_area:
    slug: gpw-v4-land-water-area-rev11
    filename: "gpw-v4-land-water-area-rev11_landareakm_2pt5_min_tif.zip"
    format: tif
    units: "km²"
    long_name: "Land area per pixel"
    static: true
