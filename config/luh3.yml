# LUH3 v3.1.1 - Land-Use Harmonization 3 Variable Registry
#
# Data source:
#   Project      : input4MIPs
#   Institution  : UofMD
#   Source ver.  : 3.1.1
#   Files available: states, transitions, management, static
#   Processing pipeline currently uses: states + transitions
#
# Manual download entrypoint:
#   https://aims2.llnl.gov/search
#   Filters: Project=input4MIPs, Institution ID=UofMD, Source Version=3.1.1

project: input4MIPs
institution_id: UofMD
source_version: "3.1.1"
temporal_range: [1900, 2024]

raw_files:
  states: states.nc
  transitions: transitions.nc
  management: management.nc
  static: static.nc

search_patterns:
  states: "*multiple-states*UofMD-landState-3-1-1*.nc"
  transitions: "*multiple-transitions*UofMD-landState-3-1-1*.nc"
  management: "*multiple-management*UofMD-landState-3-1-1*.nc"
  static: "*multiple-static*UofMD-landState-3-1-1*.nc"

# Fallback direct URLs for LUH3 v3.1.1 (v20250325).
# Used when ESGF discovery endpoints are temporarily unreachable.
direct_urls:
  states: https://esgf-node.ornl.gov/thredds/fileServer/user_pub_work/input4MIPs/CMIP7/CMIP/UofMD/UofMD-landState-3-1-1/land/yr/multiple-states/gn/v20250325/multiple-states_input4MIPs_landState_CMIP_UofMD-landState-3-1-1_gn_0850-2024.nc
  transitions: https://esgf-node.ornl.gov/thredds/fileServer/user_pub_work/input4MIPs/CMIP7/CMIP/UofMD/UofMD-landState-3-1-1/land/yr/multiple-transitions/gn/v20250325/multiple-transitions_input4MIPs_landState_CMIP_UofMD-landState-3-1-1_gn_0850-2023.nc
  management: https://esgf-node.ornl.gov/thredds/fileServer/user_pub_work/input4MIPs/CMIP7/CMIP/UofMD/UofMD-landState-3-1-1/land/yr/multiple-management/gn/v20250325/multiple-management_input4MIPs_landState_CMIP_UofMD-landState-3-1-1_gn_0850-2024.nc
  static: https://esgf-node.ornl.gov/thredds/fileServer/user_pub_work/input4MIPs/CMIP7/CMIP/UofMD/UofMD-landState-3-1-1/land/fx/multiple-static/gn/v20250325/multiple-static_input4MIPs_landState_CMIP_UofMD-landState-3-1-1_gn.nc

variables:
  # Primary land
  primf:
    long_name: Forested primary land
    units: "1"
    category: land_use_fraction
  primn:
    long_name: Non-forested primary land
    units: "1"
    category: land_use_fraction

  # Secondary land
  secdf:
    long_name: Potentially forested secondary land
    units: "1"
    category: land_use_fraction
  secdn:
    long_name: Potentially non-forested secondary land
    units: "1"
    category: land_use_fraction

  # Managed land
  pastr:
    long_name: Managed pasture
    units: "1"
    category: land_use_fraction
  range:
    long_name: Rangeland
    units: "1"
    category: land_use_fraction
  urban:
    long_name: Urban land
    units: "1"
    category: land_use_fraction

  # Cropland
  c3ann:
    long_name: C3 annual crops
    units: "1"
    category: land_use_fraction
  c3per:
    long_name: C3 perennial crops
    units: "1"
    category: land_use_fraction
  c4ann:
    long_name: C4 annual crops
    units: "1"
    category: land_use_fraction
  c4per:
    long_name: C4 perennial crops
    units: "1"
    category: land_use_fraction
  c3nfx:
    long_name: C3 nitrogen-fixing crops
    units: "1"
    category: land_use_fraction

  # Secondary forest characteristics
  secma:
    long_name: Secondary mean age
    units: years
    category: secondary_forest
  secmb:
    long_name: Secondary mean biomass carbon density
    units: kg C m-2
    category: secondary_forest
