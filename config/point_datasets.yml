# Generic yearly point-dataset rasterization config
# Datasets included:
# - UCDP GED (conflict events)
# - GDIS (disaster events)
# - USGS Earthquakes (event catalog)
# - IBTrACS Cyclones (track points)
# - NOAA Significant Volcanic Eruptions
# - NASA COOLR Landslides

output:
  final_root: "data/final"
  plots_root: "plots/point_datasets"
  plot_every: 10

filters:
  land_mask_path: "data/final/static/geography/dist_to_coast.nc"

# Maximum output year hard stop.
min_output_year: 1900
max_output_year: 2025

datasets:
  ucdp_ged:
    enabled: true
    mode: event
    source_name: "UCDP GED"
    raw_path: "data/raw/ucdp_ged/ucdp_ged.csv"
    domain: "hazards_and_conflict"
    var_prefix: "conflict"
    columns:
      latitude: ["latitude", "lat", "latitude_best", "where_lat"]
      longitude: ["longitude", "lon", "longitude_best", "where_lon"]
      year: ["year", "date_start", "date"]
    include_count: true
    include_distance: true
    include_cumulative_count: true
    values:
      - key: "fatalities"
        columns: ["best", "deaths_a", "deaths_b", "deaths_civilians", "fatalities"]
        units: "deaths per cell"
        long_name: "Conflict fatalities"
        include_cumulative: true

  gdis:
    enabled: true
    mode: event
    source_name: "GDIS"
    raw_path: "data/raw/gdis/gdis.csv"
    domain: "hazards_and_conflict"
    var_prefix: "disaster"
    columns:
      latitude: ["latitude", "lat"]
      longitude: ["longitude", "lon"]
      year: ["year", "start_year", "event_year"]
    include_count: true
    include_distance: true
    include_cumulative_count: true
    values:
      - key: "deaths"
        columns: ["deaths", "total_deaths", "n_deaths"]
        units: "deaths per cell"
        long_name: "Disaster deaths"
        include_cumulative: true
      - key: "affected"
        columns: ["affected", "total_affected", "n_affected"]
        units: "persons per cell"
        long_name: "Disaster affected population"
        include_cumulative: true

  earthquakes_usgs:
    enabled: true
    mode: event
    source_name: "USGS Earthquake Catalog (FDSN)"
    raw_path: "data/raw/earthquakes_usgs/earthquakes_usgs.csv"
    domain: "hazards_and_conflict"
    var_prefix: "earthquake"
    columns:
      latitude: ["latitude", "lat"]
      longitude: ["longitude", "lon"]
      year: ["year", "time"]
    include_count: true
    include_distance: true
    include_cumulative_count: true
    values:
      - key: "magnitude"
        columns: ["mag", "magnitude"]
        units: "magnitude units per cell"
        long_name: "Earthquake magnitude sum"
        include_cumulative: true

  cyclones_ibtracs:
    enabled: true
    mode: event
    land_only: false
    source_name: "IBTrACS v04r01"
    raw_path: "data/raw/ibtracs/ibtracs_points.csv"
    domain: "hazards_and_conflict"
    var_prefix: "cyclone"
    columns:
      latitude: ["latitude", "lat"]
      longitude: ["longitude", "lon"]
      year: ["year", "season"]
    include_count: true
    include_distance: true
    include_cumulative_count: true
    values:
      - key: "wind_kts"
        columns: ["wind_kts"]
        units: "knots per cell"
        long_name: "Cyclone wind speed sum"
        include_cumulative: false
      - key: "pressure_mb"
        columns: ["pressure_mb"]
        units: "mb per cell"
        long_name: "Cyclone pressure sum"
        include_cumulative: false
        start_year: 1951

  volcanoes_noaa:
    enabled: true
    mode: event
    land_only: false
    source_name: "NOAA NCEI Significant Volcanic Eruptions"
    raw_path: "data/raw/volcanoes_noaa/volcanoes_noaa.csv"
    domain: "hazards_and_conflict"
    var_prefix: "volcano"
    columns:
      latitude: ["latitude", "lat"]
      longitude: ["longitude", "lon"]
      year: ["year"]
    include_count: true
    include_distance: true
    include_cumulative_count: true
    values:
      - key: "vei"
        columns: ["vei"]
        units: "VEI units per cell"
        long_name: "Volcanic explosivity index sum"
        include_cumulative: true
      - key: "fatalities_total"
        columns: ["fatalities_total", "deathsTotal"]
        units: "deaths per cell"
        long_name: "Volcanic fatalities"
        include_cumulative: true
      - key: "damage_musd_total"
        columns: ["damage_musd_total", "damageMillionsDollarsTotal"]
        units: "million USD per cell"
        long_name: "Volcanic damage sum"
        include_cumulative: true
