# SoilGrids 2.0 (ISRIC)
#
# Data source: https://www.isric.org/explore/soilgrids
# Data files : https://files.isric.org/soilgrids/latest/data/
# Citation   : Poggio et al. (2021), Soil 7:217-240, doi:10.5194/soil-7-217-2021
# License    : CC-BY 4.0
#
# 250m-resolution predictions of soil properties at 6 standard depths.
# Native CRS: Interrupted Goode Homolosine (EPSG:152160).
# Accessed via VRT + /vsicurl/, reprojected to 0.25° WGS84 by gdalwarp.

base_url: https://files.isric.org/soilgrids/latest/data
statistic: mean

properties:
  bdod:
    units: "cg/cm³"
    long_name: "Bulk density of the fine earth fraction"
  cec:
    units: "mmol(c)/kg"
    long_name: "Cation exchange capacity at pH 7"
  clay:
    units: "g/kg"
    long_name: "Clay content"
  nitrogen:
    units: "cg/kg"
    long_name: "Total nitrogen"
  ocd:
    units: "hg/m³"
    long_name: "Organic carbon density"
  phh2o:
    units: "pH×10"
    long_name: "Soil pH in water"
  sand:
    units: "g/kg"
    long_name: "Sand content"
  silt:
    units: "g/kg"
    long_name: "Silt content"
  cfvo:
    units: "cm³/dm³"
    long_name: "Coarse fragments volumetric"
  soc:
    units: "dg/kg"
    long_name: "Soil organic carbon content"

depths:
  - "0-5cm"
  - "5-15cm"
  - "15-30cm"
  - "30-60cm"
  - "60-100cm"
  - "100-200cm"
