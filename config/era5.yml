  # -999, -9999) in their _max, _min, _std, and _sum yearly aggregations,
  # concentrated in early reanalysis years (1940s–1960s).  The surface
  # stress and dissipation variables are also niche NWP diagnostics with
  # limited value in a general-purpose environmental dataset.  See the
  # excluded_variables list above for per-variable rationale.

