# ERA5 Monthly Means — Variable Registry
#
# Source: reanalysis-era5-single-levels-monthly-means
# Docs: https://confluence.ecmwf.int/display/CKB/ERA5:+data+documentation
#
# Each variable has:
#   cds_name:    Name used in CDS API requests
#   long_name:   Human-readable description
#   units:       CF-compliant unit string
#   aggregation: Primary yearly aggregation method (mean | sum | max | min)
#   category:    Thematic grouping

dataset: reanalysis-era5-single-levels-monthly-means
product_type: monthly_averaged_reanalysis
temporal_range: [1940, 2025]
# Excluded variables:
#   - swvl1-4, stl1-4: soil layers (redundant / low utility)
#   - ttrc, sd, lshf, lmld, lict, lai_hv, lai_lv, aluvp-d, alnip-d, z: various exclusions
#   - rsn: snow density — max<mean inconsistency at 761k pixels (removed)
#   - bld, gwd: boundary-layer / gravity-wave dissipation — sentinel values
#     (32767, 9999, -999) leak through in early reanalysis years; niche diagnostic
#   - ewss, nsss, lgws, mgws: turbulent / gravity-wave surface stress — same
#     sentinel contamination; specialised NWP variables with low end-user value
#   - lspf: large-scale precipitation fraction — sentinel contamination in _std;
#     convective vs stratiform split already captured by cp and lsp
#   - slhf, sshf: surface latent / sensible heat flux — sentinel values in
#     _max, _min, _std, _sum aggregations for pre-1960 years
excluded_variables: [swvl1, swvl2, swvl3, swvl4, stl1, stl2, stl3, stl4, ttrc, sd, lshf, lmld, lict, lai_hv, lai_lv, aluvp, aluvd, alnip, alnid, z, rsn, bld, gwd, ewss, nsss, lgws, mgws, lspf, slhf, sshf]

variables:

  # ── Temperature ────────────────────────────────────────────────────────────
  t2m:
    cds_name: 2m_temperature
    long_name: 2-metre temperature
    units: K
    aggregation: mean
    category: temperature
  d2m:
