    long_name: Skin temperature
    units: K
    aggregation: mean
    category: temperature
  sst:
    cds_name: sea_surface_temperature
    long_name: Sea surface temperature
    units: K
    aggregation: mean
    category: temperature
  stl1:
    cds_name: soil_temperature_level_1
    long_name: Soil temperature level 1
    units: K
    aggregation: mean
    category: temperature
  stl2:
    cds_name: soil_temperature_level_2
    long_name: Soil temperature level 2
    units: K
    aggregation: mean
    category: temperature
  stl3:
